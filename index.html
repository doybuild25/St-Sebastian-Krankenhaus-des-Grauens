<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>St. Sebastian – Das blaue Licht</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: "Courier New", monospace;
        padding-bottom: 100px;
    }

    /* Startscreen */
    #startScreen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
        z-index: 99999;
    }

    #startScreen h1 {
        font-size: 32px;
        letter-spacing: 3px;
        text-align: center;
        padding: 0 20px;
    }

    #startButton {
        padding: 15px 30px;
        background: #111;
        border: 1px solid #444;
        color: #fff;
        cursor: pointer;
        font-size: 18px;
    }

    #startButton:hover {
        background: #222;
    }

    /* Icon */
    #gameIcon {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin-bottom: 10px;
    }

    .scene-image {
        width: 100%;
        max-height: 420px;
        object-fit: cover;
        border-bottom: 2px solid #222;
        margin-bottom: 20px;
    }

    #textBox {
        padding: 20px;
        line-height: 1.6;
        font-size: 18px;
    }

    #choiceContainer {
        padding: 0 20px 20px 20px;
    }

    .choice-button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        background: #111;
        border: 1px solid #444;
        color: #fff;
        cursor: pointer;
        font-family: "Courier New", monospace;
        font-size: 16px;
    }

    .choice-button:hover {
        background: #222;
    }

    /* Inventar */
    #inventoryBar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(0,0,0,0.75);
        color: #fff;
        padding: 10px 20px;
        font-family: 'Courier New', monospace;
        display: flex;
        gap: 20px;
        border-top: 2px solid #3a3a3a;
        backdrop-filter: blur(4px);
        z-index: 9999;
        box-sizing: border-box;
    }

    .inventory-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    .inventory-item img {
        width: 32px;
        height: 32px;
        object-fit: contain;
    }

    /* Save/Load Buttons */
    #saveLoadBar {
        position: fixed;
        top: 0;
        right: 0;
        padding: 10px;
        display: flex;
        gap: 10px;
        z-index: 9999;
    }

    .saveButton {
        padding: 8px 12px;
        background: #111;
        border: 1px solid #444;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
    }

    .saveButton:hover {
        background: #222;
    }
</style>
</head>

<body>

<!-- Startscreen -->
<div id="startScreen">
    <img id="gameIcon" src="icon.png" alt="Spiel-Icon">
    <h1>St. Sebastian – Das blaue Licht</h1>
    <button id="startButton" onclick="startGame()">Start</button>
</div>

<!-- Save/Load -->
<div id="saveLoadBar">
    <button class="saveButton" onclick="saveGame()">Speichern</button>
    <button class="saveButton" onclick="loadGame()">Laden</button>
</div>

<!-- Szene -->
<img id="sceneImage" src="verlassenes_haus.jpg" class="scene-image" alt="Szene">
<div id="textBox"></div>
<div id="choiceContainer"></div>

<!-- Inventar -->
<div id="inventoryBar"></div>

<!-- Musik -->
<audio id="bgm" loop>
    <source src="resident_evil_style.mp3" type="audio/mpeg">
</audio>

<script>
/* --- Inventarsystem --- */

let inventory = [];

function updateInventoryBar() {
    const bar = document.getElementById("inventoryBar");
    bar.innerHTML = "";

    inventory.forEach(item => {
        const div = document.createElement("div");
        div.classList.add("inventory-item");

        div.innerHTML = `
            <img src="${item.icon}" alt="${item.name}">
            <span>${item.name}</span>
        `;

        bar.appendChild(div);
    });
}

function addItem(name, icon) {
    inventory.push({ name, icon });
    updateInventoryBar();
}

function removeItem(name) {
    inventory = inventory.filter(item => item.name !== name);
    updateInventoryBar();
}

/* --- Szenen-System --- */

function changeScene(image, text, choices = []) {
    const img = document.getElementById("sceneImage");
    img.src = image;

    document.getElementById("textBox").innerText = text;

    const container = document.getElementById("choiceContainer");
    container.innerHTML = "";

    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.classList.add("choice-button");
        btn.innerText = choice.label;
        btn.onclick = choice.action;
        container.appendChild(btn);
    });
}

/* --- Startscreen --- */

function startGame() {
    const startScreen = document.getElementById("startScreen");
    startScreen.style.display = "none";

    const bgm = document.getElementById("bgm");
    bgm.volume = 0.6;
    bgm.play().catch(() => {
        // Falls Autoplay blockiert wird, einfach ignorieren
    });

    sceneStart();
}

/* --- Save/Load --- */

let currentScene = "sceneStart";

function saveGame() {
    const saveData = {
        inventory,
        scene: currentScene
    };
    try {
        localStorage.setItem("sebastianSave", JSON.stringify(saveData));
        alert("Spielstand gespeichert.");
    } catch (e) {
        alert("Speichern nicht möglich (LocalStorage blockiert?).");
    }
}

function loadGame() {
    const save = localStorage.getItem("sebastianSave");
    if (!save) {
        alert("Kein Spielstand gefunden.");
        return;
    }

    try {
        const data = JSON.parse(save);
        inventory = data.inventory || [];
        updateInventoryBar();

        currentScene = data.scene || "sceneStart";
        if (scenes[currentScene]) {
            scenes[currentScene]();
        } else {
            sceneStart();
        }
    } catch (e) {
        alert("Spielstand beschädigt.");
    }
}

/* --- Story-Szenen --- */

const scenes = {
    sceneStart,
    findKey,
    enterHouse,
    leave,
    sceneCorridor
};

function sceneStart() {
    currentScene = "sceneStart";
    changeScene(
        "verlassenes_haus.jpg",
        "Du stehst vor dem alten Haus. Der Nebel kriecht über den Boden.",
        [
            { label: "A – Nach dem Geräusch suchen", action: findKey },
            { label: "B – Das Haus betreten", action: enterHouse },
            { label: "C – Zurück in den Wald", action: leave }
        ]
    );
}

function findKey() {
    currentScene = "findKey";
    addItem("Alter Schlüssel", "schluessel.png");

    changeScene(
        "wald_boden.jpg",
        "Du tastest über den feuchten Boden und deine Finger stoßen auf kaltes Metall: ein alter Schlüssel.",
        [
            { label: "Weiter zum Haus", action: enterHouse }
        ]
    );
}

function enterHouse() {
    currentScene = "enterHouse";
    changeScene(
        "krankenhaus_flur.jpg",
        "Die Tür knarrt, als du sie öffnest. Ein kalter Luftzug streift deine Haut. Der Flur vor dir wirkt wie ein vergessenes Krankenhaus.",
        [
            { label: "A – Dem Flur folgen", action: sceneCorridor },
            { label: "B – Zurück nach draußen", action: sceneStart }
        ]
    );
}

function leave() {
    currentScene = "leave";
    changeScene(
        "wald_dunkel.jpg",
        "Du drehst dich um, doch der Wald wirkt plötzlich noch dunkler als zuvor. Etwas beobachtet dich zwischen den Bäumen.",
        [
            { label: "Zurück zum Haus", action: sceneStart }
        ]
    );
}

function sceneCorridor() {
    currentScene = "sceneCorridor";
    changeScene(
        "krankenhaus_flur.jpg",
        "Der Flur erstreckt sich endlos. Neonröhren flackern, irgendwo tropft Wasser. Im Schatten scheint sich etwas zu bewegen.",
        [
            { label: "A – Weitergehen", action: () => alert("Hier kannst du weitere Szenen ergänzen.") },
            { label: "B – Umkehren", action: enterHouse }
        ]
    );
}
</script>

</body>
</html>
